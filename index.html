<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنتاج فيديو: سدرة المعنى</title>
    <style>
        body { margin: 0; background: #1a1a1a; font-family: 'Amiri', serif; color: #d4af37; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        #video-wrapper { position: relative; width: 854px; height: 480px; background: #000; border: 3px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.9); overflow: hidden; }
        
        canvas { width: 100%; height: 100%; }

        .controls { margin-top: 25px; display: flex; gap: 15px; }

        button { background: #d4af37; color: #1a1a1a; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; font-size: 1rem; }
        button:disabled { background: #555; color: #888; cursor: not-allowed; }
        button:hover:not(:disabled) { background: #fff; transform: translateY(-2px); }

        #status { margin-top: 15px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>

    <div id="video-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="controls">
        <button id="btnPlay">▶ تشغيل العرض</button>
        <button id="btnRecord" disabled>● بدء التسجيل والتحميل</button>
        <button id="btnStop" disabled>■ إيقاف وحفظ</button>
    </div>

    <div id="status">جاهز للعمل. اضغط "تشغيل" أولاً للتأكد من المزامنة.</div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const btnPlay = document.getElementById('btnPlay');
        const btnRecord = document.getElementById('btnRecord');
        const btnStop = document.getElementById('btnStop');
        const status = document.getElementById('status');

        canvas.width = 1280;
        canvas.height = 720;

        // ملفات المصدر
        const audio = new Audio('أنا الظل (1).mp3'); 
        const videoBg = document.createElement('video');
        videoBg.src = 'https://googleusercontent.com/generated_video_content/9774772318935628471';
        videoBg.crossOrigin = "anonymous";
        videoBg.loop = true;

        const lyrics = [
            { time: 71, text: "أَنَا الظِّلُّ الْمُسَافِرُ فِي رِكَابِكْ\nيُبَعْثِرُنِي الْحَنِينُ عَلَى تُرَابِكْ" },
            { time: 85, text: "تَسَاقَطَ فِي الْمَدَى مِنِّي فُؤَادِي\nكَفِيفاً مِثْلَ لَيْلٍ فِي عِتَابِكْ" },
            { time: 98, text: "تَعَتَّقَ فِيكَ وِجْدَانِي قَدِيماً\nلِيَبْلُغَ سِدْرَةَ الْمَعْنَى بِبَابِكْ" },
            { time: 112, text: "عَشِقْتُكَ وَالْكُؤُوسُ تَضِجُّ شَوْقاً\nفَصِرْتُ الْخَمْرَ يُعْصَرُ فِي شَرَابِكْ" },
            { time: 264, text: "فَهَلْ يَا سَيِّدَ الْمَعْنَى قَبُولٌ؟\nلِضَيْفٍ حَلَّ شَوْقاً فِي شِعَابِكْ" }
        ];

        let recorder;
        let recordedChunks = [];

        function draw() {
            ctx.drawImage(videoBg, 0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0,0,0,0.4)"; 
            ctx.fillRect(0,0, canvas.width, canvas.height);

            const currentTime = audio.currentTime;
            const currentLyric = [...lyrics].reverse().find(l => currentTime >= l.time);

            if (currentLyric) {
                ctx.font = "bold 55px 'Amiri', serif";
                ctx.fillStyle = "#d4af37";
                ctx.textAlign = "center";
                ctx.shadowBlur = 20;
                ctx.shadowColor = "black";
                
                const lines = currentLyric.text.split('\n');
                lines.forEach((line, i) => {
                    ctx.fillText(line, canvas.width/2, canvas.height/2 + (i * 80));
                });
            }
            requestAnimationFrame(draw);
        }

        btnPlay.onclick = () => {
            audio.play();
            videoBg.play();
            draw();
            btnRecord.disabled = false;
            status.innerText = "العرض يعمل الآن.. يمكنك بدء التسجيل لحفظ الفيديو.";
        };

        btnRecord.onclick = () => {
            recordedChunks = [];
            const stream = canvas.captureStream(30);
            
            // دمج صوت الملف الصوتي مع فيديو الكانفاس
            const audioStream = audio.captureStream ? audio.captureStream() : audio.mozCaptureStream();
            stream.addTrack(audioStream.getAudioTracks()[0]);

            recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            recorder.ondataavailable = (e) => recordedChunks.push(e.data);
            recorder.onstop = exportVideo;
            
            recorder.start();
            btnRecord.disabled = true;
            btnStop.disabled = false;
            status.innerText = "جاري تسجيل الفيديو مع الصوت... اضغط إيقاف عند انتهاء القصيدة.";
        };

        btnStop.onclick = () => {
            recorder.stop();
            btnStop.disabled = true;
            status.innerText = "تمت المعالجة.. جاري التحميل.";
        };

        function exportVideo() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'فيديو_سدرة_المعنى.webm';
            a.click();
        }
    </script>
</body>
</html>

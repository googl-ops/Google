<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سدرة المعنى - إنتاج شعري</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; font-family: 'Amiri', serif; color: #d4af37; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #canvas-wrapper { position: relative; width: 854px; height: 480px; border: 2px solid #333; box-shadow: 0 0 50px #000; }
        canvas { width: 100%; height: 100%; }
        .controls { margin-top: 20px; display: flex; gap: 15px; }
        button { background: rgba(212, 175, 55, 0.1); color: #d4af37; border: 1px solid #d4af37; padding: 10px 25px; cursor: pointer; border-radius: 5px; font-family: 'Aref Ruqaa', serif; transition: 0.3s; }
        button:hover:not(:disabled) { background: #d4af37; color: #000; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #status { margin-top: 10px; font-size: 0.8rem; color: #777; }
    </style>
</head>
<body>

<div id="canvas-wrapper">
    <canvas id="mainCanvas"></canvas>
</div>

<div class="controls">
    <button id="playBtn">▶ تشغيل العرض</button>
    <button id="recordBtn" disabled>● تسجيل وتحميل الفيديو</button>
</div>

<div id="status">جاهز.. تأكدي من رفع "audio.mp3" في نفس المجلد</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const playBtn = document.getElementById('playBtn');
    const recordBtn = document.getElementById('recordBtn');
    const status = document.getElementById('status');

    canvas.width = 1280;
    canvas.height = 720;

    // الربط مع الملف المرفوع في GitHub
    const audio = new Audio('audio.mp3'); 
    const videoBg = document.createElement('video');
    videoBg.src = 'https://googleusercontent.com/generated_video_content/9774772318935628471';
    videoBg.crossOrigin = "anonymous";
    videoBg.loop = true;

    const lyrics = [
        { time: 0, text: "سدرة المعنى" },
        { time: 71, text: "أَنَا الظِّلُّ الْمُسَافِرُ فِي رِكاَبِكْ\nيُبَعْثِرُنِي الْحَنِينُ عَلَى تُرَابِكْ" },
        { time: 85, text: "تَسَاقَطَ فِي الْمَدَى مِنِّي فُؤَادِي\nكَفِيفاً مِثْلَ لَيْلٍ فِي عِتَابِكْ" },
        { time: 98, text: "تَعَتَّقَ فِيكَ وِجْدَانِي قَدِيماً\nلِيَبْلُغَ سِدْرَةَ الْمَعْنَى بِبَابِكْ" },
        { time: 112, text: "عَشِقْتُكَ وَالْكُؤُوسُ تَضِجُّ شَوْقاً\nفَصِرْتُ الْخَمْرَ يُعْصَرُ فِي شَرَابِكْ" },
        { time: 126, text: "خَلَعْتُ الْوَعْيَ كَالْأَثْوَابِ عَنِّي\nفَأَلْبِسْنِي يَقِيناً.. مِنْ كِتَابِكْ" },
        { time: 140, text: "وَصُغْنِي \"خَاتَماً\" بِيَدَيْكَ وَامْسَحْ\nنُقُوشِي كَيْ أَذُوبَ مَعَ انْسِكَابِكْ" },
        { time: 153, text: "أُقَامِرُ بِالْخُلُودِ وَلَسْتُ أَبْغِي\nجِنَاناً بَلْ مَقَاماً فِي جَنَابِكْ" },
        { time: 264, text: "فَهَلْ يَا سَيِّدَ الْمَعْنَى قَبُولٌ؟\nلِضَيْفٍ حَلَّ شَوْقاً فِي شِعَابِكْ" }
    ];

    let recorder;
    let chunks = [];

    function draw() {
        ctx.drawImage(videoBg, 0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0,0, canvas.width, canvas.height);

        const current = [...lyrics].reverse().find(l => audio.currentTime >= l.time);
        if (current) {
            ctx.font = "bold 60px 'Amiri'";
            ctx.fillStyle = "#d4af37";
            ctx.textAlign = "center";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "black";
            current.text.split('\n').forEach((line, i) => {
                ctx.fillText(line, canvas.width/2, canvas.height/2 + (i * 80));
            });
        }
        requestAnimationFrame(draw);
    }

    playBtn.onclick = () => {
        audio.play();
        videoBg.play();
        draw();
        playBtn.disabled = true;
        recordBtn.disabled = false;
        status.innerText = "العرض يعمل.. يمكنك البدء بالتسجيل لحفظ الفيديو";
    };

    recordBtn.onclick = () => {
        chunks = [];
        const stream = canvas.captureStream(30);
        const audioStream = audio.captureStream ? audio.captureStream() : audio.mozCaptureStream();
        stream.addTrack(audioStream.getAudioTracks()[0]);

        recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'فيديو_سدرة_المعنى.webm';
            a.click();
        };
        recorder.start();
        recordBtn.innerText = "■ إيقاف وحفظ الفيديو";
        recordBtn.onclick = () => recorder.stop();
        status.innerText = "جاري التسجيل دمج الصوت والكلمات...";
    };
</script>
</body>
</html>
